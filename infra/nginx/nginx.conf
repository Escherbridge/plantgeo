worker_processes auto;
events { worker_connections 1024; }

http {
    proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tile_cache:100m
                     max_size=10g inactive=7d use_temp_path=off;

    gzip on;
    gzip_types application/x-protobuf application/vnd.mapbox-vector-tile application/json;
    gzip_min_length 256;

    upstream martin { server martin:3000; }
    upstream valhalla { server valhalla:8002; }
    upstream photon { server photon:2322; }

    map $uri $tile_cache_ttl {
        default                            86400;
        ~^/tiles/(?:pmtiles|fonts|sprites) 604800;
        ~^/tiles/geo\.                     300;
    }

    server {
        listen 80;

        location /tiles/ {
            proxy_pass http://martin/;
            proxy_cache tile_cache;
            proxy_cache_key "$host$request_uri";
            proxy_cache_valid 200 1d;
            proxy_cache_valid 404 1m;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=$tile_cache_ttl";
            add_header Access-Control-Allow-Origin "*";
            add_header Vary "Accept-Encoding";
        }

        location /route/ {
            proxy_pass http://valhalla/;
            proxy_cache_valid 200 10m;
            add_header Access-Control-Allow-Origin "*";
        }

        location /geocode/ {
            proxy_pass http://photon/;
            proxy_cache_valid 200 1h;
            add_header Access-Control-Allow-Origin "*";
        }

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
